<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Squad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #888;
    --accent: #d4a853;
    --accent2: #e8c97a;
    --green: #4ade80;
    --red: #f87171;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* LAYOUT */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
    display: block;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sidebar-section { padding: 20px 16px 12px; }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .agent-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 2px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
  }

  .agent-btn:hover { background: var(--surface2); color: var(--text); }
  .agent-btn.active { background: rgba(212,168,83,0.12); color: var(--accent); }

  .agent-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .agent-btn.active .agent-icon {
    background: rgba(212,168,83,0.15);
    border-color: rgba(212,168,83,0.3);
  }

  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
  .agent-role { font-size: 11px; opacity: 0.6; line-height: 1.3; }

  .api-section {
    margin-top: auto;
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .api-section label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }

  .api-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color 0.15s;
  }

  .api-input:focus { border-color: var(--border2); }
  .api-input::placeholder { color: var(--muted); }

  .api-status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }

  /* MAIN */
  .main { display: flex; flex-direction: column; }

  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
  }

  .topbar-meta { font-size: 12px; color: var(--muted); }

  .pipeline-bar {
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    overflow-x: auto;
  }

  .pipeline-step {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
  }

  .pipeline-step.running {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(212,168,83,0.08);
    animation: pulse 1.5s infinite;
  }

  .pipeline-step.done { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.06); }
  .pipeline-step.error { border-color: var(--red); color: var(--red); }
  .pipeline-arrow { color: var(--border2); font-size: 12px; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* PROMPT AREA */
  .prompt-area {
    padding: 32px;
    border-bottom: 1px solid var(--border);
  }

  .prompt-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .prompt-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 16px 20px;
    font-size: 15px;
    font-family: 'Geist', sans-serif;
    line-height: 1.7;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.15s;
  }

  .prompt-textarea:focus { border-color: var(--border2); }
  .prompt-textarea::placeholder { color: #444; }

  .prompt-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    gap: 12px;
  }

  .examples-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .example-chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Geist', sans-serif;
  }

  .example-chip:hover { border-color: var(--border2); color: var(--text); }

  .run-btn {
    padding: 10px 24px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .run-btn:hover { background: var(--accent2); }
  .run-btn:active { transform: scale(0.97); }
  .run-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  /* OUTPUT */
  .output-area { flex: 1; padding: 32px; overflow-y: auto; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    text-align: center;
    color: var(--muted);
  }

  .empty-mark {
    font-family: 'DM Serif Display', serif;
    font-size: 48px;
    color: #1e1e1e;
    margin-bottom: 12px;
  }

  .agent-output {
    margin-bottom: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .agent-output-header {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .output-agent-name {
    font-weight: 500;
    font-size: 14px;
  }

  .output-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }

  .output-badge.done { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .output-badge.running { background: rgba(212,168,83,0.1); color: var(--accent); border: 1px solid rgba(212,168,83,0.2); }
  .output-badge.error { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

  .agent-output-body {
    padding: 20px;
    background: var(--bg);
    font-size: 14px;
    line-height: 1.8;
    color: #ccc;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Code blocks */
  .agent-output-body pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }

  .copy-btn {
    float: right;
    font-size: 11px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Geist', sans-serif;
    transition: all 0.15s;
    margin-bottom: 8px;
  }

  .copy-btn:hover { color: var(--text); border-color: var(--border2); }

  /* Markdown-style rendering */
  .rendered h1, .rendered h2, .rendered h3 {
    font-family: 'DM Serif Display', serif;
    color: var(--text);
    margin: 16px 0 8px;
  }
  .rendered h1 { font-size: 22px; }
  .rendered h2 { font-size: 18px; }
  .rendered h3 { font-size: 15px; }
  .rendered strong { color: var(--accent); font-weight: 500; }
  .rendered code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #aaa;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { height: auto; position: static; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-mark">Design Squad</span>
      <span class="logo-sub">AI Design Team</span>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">Modo</p>
      <button class="agent-btn active" onclick="selectAgent('squad')" id="btn-squad">
        <div class="agent-icon">⬡</div>
        <div class="agent-info">
          <div class="agent-name">Squad completo</div>
          <div class="agent-role">Todos os agentes em pipeline</div>
        </div>
      </button>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">Agente único</p>
      <div id="agents-list"></div>
    </div>

    <div class="api-section">
      <label>Anthropic API Key</label>
      <input type="password" class="api-input" id="api-key" placeholder="sk-ant-..." oninput="checkApiKey()" />
      <div class="api-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Cole sua chave para começar</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Squad completo</div>
        <div class="topbar-meta" id="topbar-meta">Estrategista → UX → Visual → Copy → Revisor</div>
      </div>
    </div>

    <div class="pipeline-bar" id="pipeline-bar">
      <span class="pipeline-step" id="ps-estrategista">Estrategista</span>
      <span class="pipeline-arrow">›</span>
      <span class="pipeline-step" id="ps-ux">UX</span>
      <span class="pipeline-arrow">›</span>
      <span class="pipeline-step" id="ps-visual">Visual</span>
      <span class="pipeline-arrow">›</span>
      <span class="pipeline-step" id="ps-copy">Copy</span>
      <span class="pipeline-arrow">›</span>
      <span class="pipeline-step" id="ps-revisor">Revisor</span>
    </div>

    <div class="prompt-area">
      <p class="prompt-label">Briefing</p>
      <textarea class="prompt-textarea" id="prompt-input"
        placeholder="Descreva o que o squad deve criar. Ex: Landing page para um app de meditação, público 25-40 anos, tom calmo e minimalista..."></textarea>
      <div class="prompt-actions">
        <div class="examples-row">
          <button class="example-chip" onclick="fillEx('Landing page para app de finanças pessoais')">App de finanças</button>
          <button class="example-chip" onclick="fillEx('Dashboard para SaaS B2B de RH')">Dashboard SaaS</button>
          <button class="example-chip" onclick="fillEx('Identidade visual para startup de saúde mental')">Identidade visual</button>
          <button class="example-chip" onclick="fillEx('Post Instagram para lançamento de produto tech')">Post Instagram</button>
        </div>
        <button class="run-btn" id="run-btn" onclick="runSquad()" disabled>Enviar →</button>
      </div>
    </div>

    <div class="output-area" id="output-area">
      <div class="empty-state">
        <div class="empty-mark">◆</div>
        <p style="font-size:14px;">Cole sua API key e descreva o que precisa.</p>
        <p style="font-size:12px; margin-top:4px; opacity:0.5;">O squad vai trabalhar em tempo real.</p>
      </div>
    </div>
  </main>
</div>

<script>
const PIPELINE = ['estrategista', 'ux', 'visual', 'copy', 'revisor'];
const AGENT_META = {
  estrategista: { name: 'Estrategista', role: 'Briefing e conceito', icon: '◈' },
  ux: { name: 'UX Designer', role: 'Fluxo e estrutura', icon: '◻' },
  visual: { name: 'Visual Designer', role: 'UI, cores, tipografia', icon: '◆' },
  copy: { name: 'Copywriter', role: 'Textos e headlines', icon: '◇' },
  revisor: { name: 'Revisor', role: 'QA e refinamento', icon: '◎' },
};

let currentAgent = 'squad';
let running = false;

// Render agent buttons
const list = document.getElementById('agents-list');
Object.entries(AGENT_META).forEach(([id, a]) => {
  const btn = document.createElement('button');
  btn.className = 'agent-btn';
  btn.id = 'btn-' + id;
  btn.onclick = () => selectAgent(id);
  btn.innerHTML = `<div class="agent-icon">${a.icon}</div><div class="agent-info"><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>`;
  list.appendChild(btn);
});

function selectAgent(id) {
  currentAgent = id;
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + id).classList.add('active');

  const pipelineBar = document.getElementById('pipeline-bar');
  if (id === 'squad') {
    document.getElementById('topbar-title').textContent = 'Squad completo';
    document.getElementById('topbar-meta').textContent = 'Estrategista → UX → Visual → Copy → Revisor';
    pipelineBar.style.display = 'flex';
  } else {
    const a = AGENT_META[id];
    document.getElementById('topbar-title').textContent = a.name;
    document.getElementById('topbar-meta').textContent = a.role;
    pipelineBar.style.display = 'none';
  }
}

function checkApiKey() {
  const key = document.getElementById('api-key').value.trim();
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const btn = document.getElementById('run-btn');
  if (key.startsWith('sk-ant-') && key.length > 20) {
    dot.className = 'status-dot ok';
    txt.textContent = 'Chave válida';
    btn.disabled = false;
  } else if (key.length > 0) {
    dot.className = 'status-dot err';
    txt.textContent = 'Formato inválido';
    btn.disabled = true;
  } else {
    dot.className = 'status-dot';
    txt.textContent = 'Cole sua chave para começar';
    btn.disabled = true;
  }
}

function fillEx(text) {
  document.getElementById('prompt-input').value = text;
}

function renderMarkdown(text) {
  return text
    .replace(/```html([\s\S]*?)```/g, (_, code) => `<div style="position:relative"><button class="copy-btn" onclick="copyCode(this)">Copiar</button><pre>${escHtml(code.trim())}</pre></div>`)
    .replace(/```([\s\S]*?)```/g, (_, code) => `<pre>${escHtml(code.trim())}</pre>`)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.*)/gm, '<h3>$1</h3>')
    .replace(/^## (.*)/gm, '<h2>$1</h2>')
    .replace(/^# (.*)/gm, '<h1>$1</h1>')
    .replace(/\n/g, '<br>');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(btn) {
  const code = btn.nextElementSibling.textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  });
}

function createOutputCard(agentId, status) {
  const a = AGENT_META[agentId] || { name: agentId, icon: '◆' };
  const div = document.createElement('div');
  div.className = 'agent-output';
  div.id = 'out-' + agentId;
  div.innerHTML = `
    <div class="agent-output-header">
      <span>${a.icon}</span>
      <span class="output-agent-name">${a.name}</span>
      <span class="output-badge ${status}" id="badge-${agentId}">${status === 'running' ? '<span class="spinner"></span> Trabalhando...' : status}</span>
    </div>
    <div class="agent-output-body rendered" id="body-${agentId}"></div>
  `;
  return div;
}

async function runSquad() {
  if (running) return;
  const prompt = document.getElementById('prompt-input').value.trim();
  const apiKey = document.getElementById('api-key').value.trim();
  if (!prompt || !apiKey) return;

  running = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('output-area').innerHTML = '';

  // Reset pipeline steps
  PIPELINE.forEach(id => {
    const el = document.getElementById('ps-' + id);
    if (el) el.className = 'pipeline-step';
  });

  if (currentAgent === 'squad') {
    await runFullSquad(prompt, apiKey);
  } else {
    await runSingleAgent(currentAgent, prompt, apiKey);
  }

  running = false;
  document.getElementById('run-btn').disabled = false;
}

async function runSingleAgent(agentId, prompt, apiKey) {
  const area = document.getElementById('output-area');
  const card = createOutputCard(agentId, 'running');
  area.appendChild(card);

  try {
    const res = await fetch(`/api/run/${agentId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, apiKey }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    document.getElementById('body-' + agentId).innerHTML = renderMarkdown(data.result);
    document.getElementById('badge-' + agentId).className = 'output-badge done';
    document.getElementById('badge-' + agentId).textContent = 'Concluído';
  } catch (e) {
    document.getElementById('body-' + agentId).textContent = 'Erro: ' + e.message;
    document.getElementById('badge-' + agentId).className = 'output-badge error';
    document.getElementById('badge-' + agentId).textContent = 'Erro';
  }
}

async function runFullSquad(prompt, apiKey) {
  const area = document.getElementById('output-area');

  const res = await fetch('/api/run/squad/full', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, apiKey }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try {
        const ev = JSON.parse(line.slice(6));
        handleEvent(ev, area);
      } catch {}
    }
  }
}

function handleEvent(ev, area) {
  if (ev.type === 'agent_start') {
    // Update pipeline bar
    const ps = document.getElementById('ps-' + ev.agentId);
    if (ps) ps.className = 'pipeline-step running';

    const card = createOutputCard(ev.agentId, 'running');
    area.appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  if (ev.type === 'agent_done') {
    const ps = document.getElementById('ps-' + ev.agentId);
    if (ps) ps.className = 'pipeline-step done';

    const body = document.getElementById('body-' + ev.agentId);
    const badge = document.getElementById('badge-' + ev.agentId);
    if (body) body.innerHTML = renderMarkdown(ev.result);
    if (badge) { badge.className = 'output-badge done'; badge.textContent = 'Concluído'; }
  }

  if (ev.type === 'agent_error') {
    const ps = document.getElementById('ps-' + ev.agentId);
    if (ps) ps.className = 'pipeline-step error';

    const body = document.getElementById('body-' + ev.agentId);
    const badge = document.getElementById('badge-' + ev.agentId);
    if (body) body.textContent = 'Erro: ' + ev.error;
    if (badge) { badge.className = 'output-badge error'; badge.textContent = 'Erro'; }
  }
}
</script>
</body>
</html>
